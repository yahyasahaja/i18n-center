basePath: /api
definitions:
  cms.Item:
    properties:
      application_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      id:
        type: string
      identifier:
        type: string
      name:
        type: string
      template:
        $ref: '#/definitions/cms.Template'
      template_id:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  cms.Localization:
    properties:
      cms_item_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      data:
        $ref: '#/definitions/repository.JSONB'
      id:
        type: string
      is_active:
        type: boolean
      locale:
        type: string
      source_locale:
        type: string
      stage:
        $ref: '#/definitions/translation.Stage'
      updated_at:
        type: string
      updated_by:
        type: string
      version:
        type: integer
    type: object
  cms.Template:
    properties:
      application_id:
        type: string
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/cms.TemplateField'
        type: array
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  cms.TemplateField:
    properties:
      created_at:
        type: string
      id:
        type: string
      key:
        type: string
      label:
        type: string
      required:
        type: boolean
      sort_order:
        type: integer
      template_id:
        type: string
      updated_at:
        type: string
      value_type:
        type: string
    type: object
  handlers.ApplicationRequest:
    properties:
      code:
        description: Unique identifier
        type: string
      description:
        type: string
      enabled_languages:
        items:
          type: string
        type: array
      name:
        type: string
      openai_key:
        description: Accept from frontend
        type: string
    required:
    - code
    - name
    type: object
  handlers.AutoTranslateRequest:
    properties:
      source_locale:
        type: string
      stage:
        type: string
      target_locale:
        type: string
    required:
    - source_locale
    - stage
    - target_locale
    type: object
  handlers.BackfillRequest:
    properties:
      source_locale:
        type: string
      stage:
        type: string
      target_locales:
        items:
          type: string
        type: array
    required:
    - source_locale
    - stage
    - target_locales
    type: object
  handlers.BootstrapRequest:
    properties:
      data:
        additionalProperties: true
        type: object
    required:
    - data
    type: object
  handlers.BootstrapResult:
    properties:
      components:
        items:
          type: string
        type: array
      components_created:
        type: integer
      components_updated:
        type: integer
      flat_keys_in_common:
        type: integer
      keys_imported:
        type: integer
    type: object
  handlers.ImportRequest:
    properties:
      data:
        additionalProperties: true
        type: object
    required:
    - data
    type: object
  handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/user.User'
    type: object
  handlers.SaveTranslationRequest:
    properties:
      data:
        $ref: '#/definitions/repository.JSONB'
      locale:
        type: string
      stage:
        type: string
    required:
    - data
    - locale
    - stage
    type: object
  handlers.attachComponentsBody:
    properties:
      component_ids:
        items:
          type: string
        type: array
    required:
    - component_ids
    type: object
  handlers.backfillCmsLocalizationBody:
    properties:
      source_locale:
        type: string
      stage:
        type: string
      target_locales:
        items:
          type: string
        type: array
    required:
    - source_locale
    - stage
    - target_locales
    type: object
  handlers.cmsTemplateFieldInput:
    properties:
      key:
        type: string
      label:
        type: string
      required:
        type: boolean
      sort_order:
        type: integer
      value_type:
        type: string
    required:
    - key
    - label
    - value_type
    type: object
  handlers.createCmsItemBody:
    properties:
      description:
        type: string
      identifier:
        type: string
      name:
        type: string
      template_id:
        type: string
    required:
    - identifier
    - name
    - template_id
    type: object
  handlers.createCmsTemplateBody:
    properties:
      code:
        type: string
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/handlers.cmsTemplateFieldInput'
        type: array
      name:
        type: string
    required:
    - code
    - name
    type: object
  handlers.deployCmsLocalizationBody:
    properties:
      from_stage:
        type: string
      locale:
        type: string
      to_stage:
        type: string
    required:
    - from_stage
    - locale
    - to_stage
    type: object
  handlers.revertCmsLocalizationBody:
    properties:
      locale:
        type: string
      stage:
        type: string
      version:
        type: integer
    required:
    - locale
    - stage
    - version
    type: object
  handlers.saveCmsLocalizationBody:
    properties:
      data:
        $ref: '#/definitions/repository.JSONB'
      locale:
        type: string
      stage:
        type: string
    required:
    - data
    - locale
    - stage
    type: object
  handlers.translateCmsLocalizationBody:
    properties:
      source_locale:
        type: string
      stage:
        type: string
      target_locale:
        type: string
    required:
    - source_locale
    - stage
    - target_locale
    type: object
  handlers.updateCmsItemBody:
    properties:
      description:
        type: string
      name:
        type: string
      template_id:
        type: string
    type: object
  handlers.updateCmsTemplateBody:
    properties:
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/handlers.cmsTemplateFieldInput'
        type: array
      name:
        type: string
    type: object
  job.CmsTranslateJob:
    properties:
      application_id:
        type: string
      claimed_by:
        type: string
      cms_item_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      error_detail:
        type: string
      error_message:
        type: string
      id:
        type: string
      source_locale:
        type: string
      stage:
        $ref: '#/definitions/translation.Stage'
      status:
        type: string
      target_locale:
        type: string
      updated_at:
        type: string
    type: object
  models.Application:
    properties:
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      enabled_languages:
        items:
          type: string
        type: array
      has_openai_key:
        type: boolean
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  models.AuditLog:
    properties:
      action:
        type: string
      changes:
        $ref: '#/definitions/models.JSONB'
      created_at:
        type: string
      id:
        type: string
      ip_address:
        type: string
      resource_code:
        type: string
      resource_id:
        type: string
      resource_type:
        type: string
      user_agent:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  models.JSONB:
    additionalProperties: true
    type: object
  models.TranslateJob:
    properties:
      application_id:
        type: string
      claimed_by:
        type: string
      component_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      error_detail:
        type: string
      error_message:
        type: string
      id:
        type: string
      job_type:
        type: string
      source_locale:
        type: string
      status:
        type: string
      target_locales:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  repository.JSONB:
    additionalProperties: {}
    type: object
  translation.Stage:
    enum:
    - draft
    - staging
    - production
    type: string
    x-enum-varnames:
    - StageDraft
    - StageStaging
    - StageProduction
  translation.Version:
    properties:
      component_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      data:
        $ref: '#/definitions/repository.JSONB'
      id:
        type: string
      is_active:
        type: boolean
      locale:
        type: string
      source_data:
        $ref: '#/definitions/repository.JSONB'
      source_locale:
        type: string
      stage:
        $ref: '#/definitions/translation.Stage'
      updated_at:
        type: string
      updated_by:
        type: string
      version:
        type: integer
    type: object
  user.User:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Centralized i18n management service API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: i18n Center API
  version: "1.0"
paths:
  /applications:
    get:
      consumes:
      - application/json
      description: Get all applications
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Application'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List applications
      tags:
      - applications
    post:
      consumes:
      - application/json
      description: Create a new application
      parameters:
      - description: Application data
        in: body
        name: application
        required: true
        schema:
          $ref: '#/definitions/handlers.ApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Application'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create application
      tags:
      - applications
  /applications/{id}/api-keys:
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: id, key_prefix, name, created_at
          schema:
            items:
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: List application API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Generate a new API key for the application. Only super_admin can
        create. The full key is returned once; store it securely.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Optional: { \'
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: id, key (only here), key_prefix, name
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create application API key
      tags:
      - api-keys
  /applications/{id}/api-keys/{key_id}:
    delete:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: API Key ID
        in: path
        name: key_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete application API key
      tags:
      - api-keys
  /applications/{id}/bootstrap:
    post:
      consumes:
      - application/json
      description: Bulk-creates components and seeds draft translations from a locale
        JSON.
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Locale to seed (default: en)'
        in: query
        name: locale
        type: string
      - description: 'Target stage (default: draft)'
        in: query
        name: stage
        type: string
      - description: Full locale JSON keyed by component code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.BootstrapRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BootstrapResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Bootstrap application translations
      tags:
      - bootstrap
  /applications/{id}/cms/{identifier}:
    get:
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: CMS item identifier (e.g. flash_banner)
        in: path
        name: identifier
        required: true
        type: string
      - description: 'Locale code (default: en)'
        in: query
        name: locale
        type: string
      - description: 'Stage: draft | staging | production (default: production)'
        in: query
        name: stage
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get CMS item by identifier
      tags:
      - cms-public
  /applications/{id}/cms/items:
    get:
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cms.Item'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List CMS items
      tags:
      - cms
    post:
      consumes:
      - application/json
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: CMS item data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createCmsItemBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/cms.Item'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create CMS item
      tags:
      - cms
  /applications/{id}/cms/templates:
    get:
      description: Get all CMS templates for an application
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cms.Template'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List templates
      tags:
      - cms
    post:
      consumes:
      - application/json
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Template data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createCmsTemplateBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/cms.Template'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create template
      tags:
      - cms
  /applications/{id}/translations/by-page/{pageCode}:
    get:
      consumes:
      - application/json
      description: Returns translations for all components that have the given page.
        Response is a map of component code -> translation data.
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Page code (e.g. home, cart)
        in: path
        name: pageCode
        required: true
        type: string
      - description: 'Locale (default: en)'
        in: query
        name: locale
        type: string
      - description: 'Stage (default: production)'
        in: query
        name: stage
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Map of component_code -> translation data
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get translations by page
      tags:
      - translations
  /applications/{id}/translations/by-tag/{tagCode}:
    get:
      consumes:
      - application/json
      description: Returns translations for all components that have the given tag.
        Response is a map of component code -> translation data.
      parameters:
      - description: Application ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Tag code (e.g. checkout, pdp)
        in: path
        name: tagCode
        required: true
        type: string
      - description: 'Locale (default: en)'
        in: query
        name: locale
        type: string
      - description: 'Stage (default: production)'
        in: query
        name: stage
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Map of component_code -> translation data
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get translations by tag
      tags:
      - translations
  /audit/history/{resource_type}/{resource_id}:
    get:
      consumes:
      - application/json
      description: Get all changes for a specific resource
      parameters:
      - description: Resource type (application, component, translation, user)
        in: path
        name: resource_type
        required: true
        type: string
      - description: Resource ID
        in: path
        name: resource_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AuditLog'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get resource history
      tags:
      - audit
  /audit/logs:
    get:
      consumes:
      - application/json
      description: Get audit logs with optional filters
      parameters:
      - description: Filter by resource type (application, component, translation,
          user)
        in: query
        name: resource_type
        type: string
      - description: Filter by resource ID
        in: query
        name: resource_id
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: 'Limit results (default: 100, max: 1000)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AuditLog'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get audit logs
      tags:
      - audit
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and get JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get information about the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /cms/items/{id}:
    delete:
      parameters:
      - description: CMS item ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete CMS item
      tags:
      - cms
    get:
      parameters:
      - description: CMS item ID (UUID)
